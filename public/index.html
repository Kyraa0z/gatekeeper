<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GateKeeper | Erişim</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- UMD build — tüm tarayıcılarla uyumlu, ESM syntax hatası vermez -->
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.umd.min.js"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" defer></script>
    <style>
        /* ── Değişkenler ─────────────────────────────── */
        :root {
            --bg:          #f5f5f7;
            --surface:     #ffffff;
            --surface-2:   #f9f9fb;
            --border:      #e4e4e9;
            --border-focus:#6366f1;
            --text-1:      #111118;
            --text-2:      #6b6b80;
            --text-3:      #9999b0;
            --accent:      #6366f1;
            --accent-light:#eef0ff;
            --accent-hover:#4f52d9;
            --success:     #16a34a;
            --success-bg:  #f0fdf4;
            --danger:      #dc2626;
            --danger-bg:   #fef2f2;
            --warn:        #d97706;
            --warn-bg:     #fffbeb;
            --radius-sm:   10px;
            --radius-md:   16px;
            --radius-lg:   24px;
            --shadow:      0 1px 3px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.06);
            --shadow-lg:   0 2px 8px rgba(0,0,0,.06), 0 20px 48px rgba(0,0,0,.10);
            --transition:  0.32s cubic-bezier(.4,0,.2,1);
        }

        /* ── Reset ───────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-1);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        /* ── Bağlantı durumu (sağ üst) ───────────────── */
        #conn-badge {
            position: fixed;
            top: 16px;
            right: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-2);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 12px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            z-index: 100;
        }
        #conn-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-3);
            transition: background var(--transition);
        }
        #conn-badge.connected #conn-dot  { background: var(--success); }
        #conn-badge.connecting #conn-dot { background: var(--warn); animation: pulse 1.2s infinite; }
        #conn-badge.disconnected #conn-dot { background: var(--danger); }

        @keyframes pulse {
            0%,100% { opacity: 1; }
            50%      { opacity: .3; }
        }

        /* ── Logo / marka ────────────────────────────── */
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            opacity: 0;
            transform: translateY(-8px);
            animation: fadeSlideDown .5s var(--transition) .1s forwards;
        }
        .brand-icon {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .brand-icon svg { width: 20px; height: 20px; fill: white; }
        .brand-name {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -.3px;
            color: var(--text-1);
        }
        .brand-name span { color: var(--accent); }

        /* ── Kart ────────────────────────────────────── */
        .wrapper {
            width: 100%;
            max-width: 440px;
            position: relative;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 36px 32px;
            box-shadow: var(--shadow-lg);
            display: none;
            opacity: 0;
        }
        .card.active {
            display: block;
            animation: cardIn var(--transition) forwards;
        }
        .card.leaving {
            animation: cardOut .18s ease forwards;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(14px) scale(.985); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }
        @keyframes cardOut {
            from { opacity: 1; transform: translateY(0); }
            to   { opacity: 0; transform: translateY(-8px); }
        }
        @keyframes fadeSlideDown {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Kart içi tipografi ──────────────────────── */
        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .card-icon svg { width: 24px; height: 24px; }
        .card-icon.accent  { background: var(--accent-light); }
        .card-icon.success { background: var(--success-bg); }
        .card-icon.danger  { background: var(--danger-bg); }
        .card-icon.warn    { background: var(--warn-bg); }
        .card-icon.blocked { background: #fff1f2; }

        .card h2 {
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: -.3px;
            margin-bottom: 6px;
            color: var(--text-1);
        }
        .card p {
            font-size: 14px;
            color: var(--text-2);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        /* ── Divider ─────────────────────────────────── */
        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 20px 0;
        }

        /* ── Textarea ────────────────────────────────── */
        .field { position: relative; margin-bottom: 12px; }
        .field label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-2);
            margin-bottom: 6px;
            letter-spacing: .2px;
        }
        textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            background: var(--surface-2);
            border: 1.5px solid var(--border);
            color: var(--text-1);
            font-family: inherit;
            font-size: 14px;
            resize: none;
            transition: border-color var(--transition), box-shadow var(--transition);
            line-height: 1.55;
        }
        textarea::placeholder { color: var(--text-3); }
        textarea:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(99,102,241,.12);
            background: var(--surface);
        }
        .char-count {
            text-align: right;
            font-size: 11px;
            color: var(--text-3);
            margin-top: 4px;
            transition: color .2s;
        }
        .char-count.warn { color: var(--warn); }

        /* ── Turnstile wrapper ───────────────────────── */
        .turnstile-wrap {
            margin: 16px 0;
            min-height: 65px;
        }

        /* ── Butonlar ────────────────────────────────── */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 13px 20px;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all var(--transition);
        }
        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 1px 2px rgba(99,102,241,.3), 0 4px 12px rgba(99,102,241,.2);
        }
        .btn-primary:hover:not(:disabled)  { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 2px 4px rgba(99,102,241,.3), 0 8px 20px rgba(99,102,241,.25); }
        .btn-primary:active:not(:disabled) { transform: translateY(0); }
        .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
        .btn-secondary {
            background: var(--surface-2);
            color: var(--text-1);
            border: 1.5px solid var(--border);
        }
        .btn-secondary:hover { background: var(--border); }

        .btn svg { width: 16px; height: 16px; flex-shrink: 0; }

        /* ── Pending ekranı ──────────────────────────── */
        .pending-visual {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0 8px;
        }
        .spinner-ring {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .wait-timer {
            font-size: 13px;
            color: var(--text-2);
            margin-top: 8px;
        }
        .wait-timer strong { color: var(--accent); font-variant-numeric: tabular-nums; }

        /* ── Progress dots ───────────────────────────── */
        .dots {
            display: flex;
            gap: 5px;
            margin-top: 14px;
        }
        .dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--border);
            animation: dotPulse 1.4s infinite;
        }
        .dots span:nth-child(2) { animation-delay: .2s; }
        .dots span:nth-child(3) { animation-delay: .4s; }
        @keyframes dotPulse {
            0%,80%,100% { background: var(--border); transform: scale(1); }
            40%          { background: var(--accent); transform: scale(1.3); }
        }

        /* ── Sonuç kartı ─────────────────────────────── */
        .result-status {
            font-size: 13px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 16px;
        }
        .result-status.approved { color: var(--success); background: var(--success-bg); }
        .result-status.rejected { color: var(--danger);  background: var(--danger-bg); }
        .result-status.blocked  { color: #be123c;        background: #fff1f2; }

        /* ── Footer ──────────────────────────────────── */
        .footer {
            margin-top: 20px;
            font-size: 11px;
            color: var(--text-3);
            text-align: center;
            opacity: 0;
            animation: fadeSlideDown .5s var(--transition) .4s forwards;
        }
        .footer a { color: var(--text-3); text-decoration: none; }
        .footer a:hover { color: var(--accent); }
    </style>
</head>
<body>

    <!-- Bağlantı durumu -->
    <div id="conn-badge" class="connecting">
        <div id="conn-dot"></div>
        <span id="conn-label">Bağlanıyor</span>
    </div>

    <!-- Logo -->
    <div class="brand">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5z"/>
            </svg>
        </div>
        <span class="brand-name">Gate<span>Keeper</span></span>
    </div>

    <div class="wrapper">

        <!-- ── Erişim İste ─────────────────────────── -->
        <div class="card" id="room-idle">
            <div class="card-icon accent">
                <svg viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <h2>Erişim İste</h2>
            <p>Sisteme giriş yapmak için kısa bir açıklama bırakın ve bot doğrulamasını tamamlayın.</p>

            <div class="field">
                <label for="note">Açıklama <span style="color:var(--text-3)">(isteğe bağlı)</span></label>
                <textarea id="note" placeholder="Neden erişmek istiyorsunuz?" rows="3" maxlength="200" oninput="updateCharCount(this)"></textarea>
                <div class="char-count" id="char-count">0 / 200</div>
            </div>

            <div class="turnstile-wrap">
                <div class="cf-turnstile"
                     id="turnstile-container"
                     data-sitekey="0x4AAAAAACtVuF98ksmPufI9"
                     data-theme="light"
                     data-callback="onTurnstileSuccess"
                     data-expired-callback="onTurnstileExpired"
                     data-error-callback="onTurnstileError">
                </div>
            </div>

            <button class="btn btn-primary" id="submit-btn" onclick="req()" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
                İstek Gönder
            </button>
        </div>

        <!-- ── Onay Bekleniyor ────────────────────── -->
        <div class="card" id="room-pending">
            <div class="pending-visual">
                <div class="spinner-ring"></div>
                <h2>Onay Bekleniyor</h2>
                <p style="text-align:center; margin-bottom:8px;">Talebiniz yöneticiye iletildi.<br>Bu sayfayı kapatmayın.</p>
                <div class="wait-timer">Bekleme süresi: <strong id="wait-seconds">0</strong> sn</div>
                <div class="dots"><span></span><span></span><span></span></div>
            </div>
        </div>

        <!-- ── Sonuç ──────────────────────────────── -->
        <div class="card" id="room-result">
            <div class="card-icon" id="res-icon-wrap">
                <svg id="res-icon-svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
            </div>
            <div id="res-badge" class="result-status"></div>
            <h2 id="res-t"></h2>
            <p id="res-d"></p>
            <div id="action-area"></div>
        </div>

    </div>

    <div class="footer">
        Korunan alan &nbsp;·&nbsp; <a href="#">GateKeeper</a>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // ── State ─────────────────────────────────────────────────────────
        let socket;
        let turnstileToken   = null;
        let waitInterval     = null;
        let waitSeconds      = 0;
        let currentCard      = 'room-idle';

        const sid = localStorage.getItem('sid') || Math.random().toString(36).substr(2, 9);
        localStorage.setItem('sid', sid);

        // ── Turnstile ─────────────────────────────────────────────────────
        function onTurnstileSuccess(token)  { turnstileToken = token; document.getElementById('submit-btn').disabled = false; }
        function onTurnstileExpired()       { turnstileToken = null;  document.getElementById('submit-btn').disabled = true; }
        function onTurnstileError()         { turnstileToken = null;  document.getElementById('submit-btn').disabled = true; }


        // ── Karakter sayacı ───────────────────────────────────────────────
        function updateCharCount(el) {
            const count = el.value.length;
            const display = document.getElementById('char-count');
            display.textContent = `${count} / 200`;
            display.classList.toggle('warn', count > 160);
        }

        // ── Bağlantı rozeti ───────────────────────────────────────────────
        function setConn(state, label) {
            const badge = document.getElementById('conn-badge');
            badge.className = state;
            document.getElementById('conn-label').textContent = label;
        }

        // ── Kart geçişi (fade + slide) ────────────────────────────────────
        function showCard(status) {
            const prev = document.getElementById(currentCard);

            // Bekleyen sayacı durdur
            if (status !== 'pending') {
                clearInterval(waitInterval);
                waitSeconds = 0;
            }

            // Önceki kartı anında gizle — animasyon yarış koşulu yaratmasın
            if (prev && prev !== document.getElementById(
                status === 'idle' ? 'room-idle' :
                status === 'pending' ? 'room-pending' : 'room-result'
            )) {
                prev.classList.remove('active', 'leaving');
                prev.style.display = 'none';
            }

            // Sonuç kartı içeriğini doldur
            const iconWrap = document.getElementById('res-icon-wrap');
            const iconSvg  = document.getElementById('res-icon-svg');
            const badge    = document.getElementById('res-badge');
            const title    = document.getElementById('res-t');
            const desc     = document.getElementById('res-d');
            const action   = document.getElementById('action-area');

            const configs = {
                approved: {
                    card: 'room-result',
                    iconClass: 'success',
                    iconStroke: 'var(--success)',
                    iconPath: '<polyline points="20 6 9 17 4 12"/>',
                    badgeClass: 'approved',
                    badgeText: 'Erişim Onaylandı',
                    titleText: 'Hoş geldiniz!',
                    descText:  'Sisteme giriş yapmaya yetkiniz var. Panele yönlendiriliyorsunuz.',
                    actionHtml:'<button class="btn btn-primary" onclick="window.location.reload()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>Panele Git</button>'
                },
                rejected: {
                    card: 'room-result',
                    iconClass: 'danger',
                    iconStroke: 'var(--danger)',
                    iconPath: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
                    badgeClass: 'rejected',
                    badgeText: 'Erişim Reddedildi',
                    titleText: 'Talebiniz reddedildi.',
                    descText:  'Yönetici talebinizi onaylamadı. Tekrar deneyebilirsiniz.',
                    actionHtml:'<button class="btn btn-secondary" onclick="goIdle()">Tekrar Dene</button>'
                },
                blocked: {
                    card: 'room-result',
                    iconClass: 'blocked',
                    iconStroke: '#be123c',
                    iconPath: '<circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>',
                    badgeClass: 'blocked',
                    badgeText: 'Erişim Engellendi',
                    titleText: 'Bu sisteme erişiminiz engellendi.',
                    descText:  'Güvenlik nedeniyle erişiminiz kalıcı olarak kısıtlanmıştır.',
                    actionHtml:''
                }
            };

            if (status === 'idle') {
                if (currentCard === 'room-idle') return; // Zaten idle ekranındaysa geçiş yapma
                currentCard = 'room-idle';
                activateCard('room-idle');
                return;
            }

            if (status === 'pending') {
                currentCard = 'room-pending';
                activateCard('room-pending');
                // Bekleme sayacını başlat
                waitSeconds = 0;
                document.getElementById('wait-seconds').textContent = '0';
                waitInterval = setInterval(() => {
                    waitSeconds++;
                    document.getElementById('wait-seconds').textContent = waitSeconds;
                }, 1000);
                return;
            }

            const cfg = configs[status];
            if (!cfg) return;

            currentCard = cfg.card;
            iconWrap.className = `card-icon ${cfg.iconClass}`;
            iconSvg.setAttribute('stroke', cfg.iconStroke);
            iconSvg.innerHTML = cfg.iconPath;
            badge.className   = `result-status ${cfg.badgeClass}`;
            badge.textContent = cfg.badgeText;
            title.textContent = cfg.titleText;
            desc.textContent  = cfg.descText;
            action.innerHTML  = cfg.actionHtml;

            activateCard('room-result');
        }

        function activateCard(id) {
            const el = document.getElementById(id);
            if (el.classList.contains('active')) return;
            el.style.display = 'block';
            // requestAnimationFrame bazen frame atlar — void kullanarak
            // layout'u zorla tetikle, sonra class ekle
            void el.offsetHeight;
            el.classList.add('active');
        }

        function goIdle() { window.location.reload(); } // Tekrar dene: sayfa yenile

        // ── İstek gönder ──────────────────────────────────────────────────
        function req() {
            if (!turnstileToken) return alert('Lütfen doğrulamayı tamamlayın!');
            const note = document.getElementById('note').value.trim();
            document.getElementById('submit-btn').disabled = true;
            const tokenToSend = turnstileToken;
            turnstileToken = null;
            socket.emit('request_access', { turnstileToken: tokenToSend, note });
        }

        // ── Socket bağlantısı ─────────────────────────────────────────────
        async function init() {
            // Sayfa ilk yüklenince idle kartını göster
            activateCard('room-idle');
            currentCard = 'room-idle';

            const fp     = await FingerprintJS.load();
            const result = await fp.get();

            setConn('connecting', 'Bağlanıyor');
            socket = io({ auth: { sessionId: sid, deviceId: result.visitorId } });

            socket.on('connect',    () => setConn('connected',    'Bağlı'));
            socket.on('disconnect', () => setConn('disconnected', 'Bağlantı kesildi'));
            socket.on('connect_error', () => setConn('disconnected', 'Bağlanamadı'));
            socket.on('status_update', (data) => {
                if (data.token) localStorage.setItem('gk_token', data.token);
                showCard(data.status);
            });
            socket.on('rate_limited', (data) => {
                const btn = document.getElementById('submit-btn');
                btn.textContent = '⏳ ' + (data.message || 'Çok fazla istek.');
                btn.disabled = true;
                setTimeout(() => { btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> İstek Gönder'; btn.disabled = false; }, 60000);
            });

            // Kick edilince sunucu force_reload gönderir — sayfa yenilenir,
            // Turnstile temiz başlar, sonsuz döngü olmaz.
            socket.on('force_reload', () => window.location.reload());
        }

        init();
    </script>
</body>
</html>
