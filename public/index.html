<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>GateKeeper | Erişim</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.umd.min.js"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" defer></script>
    <style>
        :root {
            --bg:           #f5f5f7;
            --surface:      #ffffff;
            --surface-2:    #f9f9fb;
            --border:       #e4e4e9;
            --border-focus: #6366f1;
            --text-1:       #111118;
            --text-2:       #6b6b80;
            --text-3:       #9999b0;
            --accent:       #6366f1;
            --accent-light: #eef0ff;
            --accent-hover: #4f52d9;
            --success:      #16a34a;
            --success-bg:   #f0fdf4;
            --danger:       #dc2626;
            --danger-bg:    #fef2f2;
            --warn:         #d97706;
            --warn-bg:      #fffbeb;
            --shadow:       0 1px 3px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.06);
            --shadow-lg:    0 2px 8px rgba(0,0,0,.06), 0 20px 48px rgba(0,0,0,.10);
            --radius-sm:    10px;
            --radius-md:    16px;
            --radius-lg:    24px;
            --tr:           0.28s cubic-bezier(.4,0,.2,1);
        }
        [data-theme="dark"] {
            --bg:           #0f0f13;
            --surface:      #1a1a24;
            --surface-2:    #22222e;
            --border:       #2e2e3e;
            --border-focus: #818cf8;
            --text-1:       #f0f0f8;
            --text-2:       #9090a8;
            --text-3:       #55556a;
            --accent:       #818cf8;
            --accent-light: #1e1e38;
            --accent-hover: #6366f1;
            --success:      #22c55e;
            --success-bg:   #052e16;
            --danger:       #f87171;
            --danger-bg:    #2d0a0a;
            --warn:         #fbbf24;
            --warn-bg:      #2d1a00;
            --shadow:       0 1px 3px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.3);
            --shadow-lg:    0 2px 8px rgba(0,0,0,.3), 0 20px 48px rgba(0,0,0,.5);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-1);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            transition: background var(--tr), color var(--tr);
            -webkit-tap-highlight-color: transparent;
        }
        #theme-toggle {
            position: fixed; top: 14px; right: 14px;
            width: 38px; height: 38px; border-radius: 50%;
            background: var(--surface); border: 1.5px solid var(--border);
            box-shadow: var(--shadow); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; transition: var(--tr); z-index: 200;
            -webkit-tap-highlight-color: transparent;
        }
        #theme-toggle:hover { transform: scale(1.1); }
        #conn-badge {
            position: fixed; top: 16px; left: 16px;
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; font-weight: 500; color: var(--text-2);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; padding: 5px 10px;
            box-shadow: var(--shadow); transition: var(--tr); z-index: 100;
        }
        #conn-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--text-3); transition: background var(--tr); flex-shrink: 0;
        }
        #conn-badge.connected #conn-dot    { background: var(--success); }
        #conn-badge.connecting #conn-dot   { background: var(--warn); animation: pulse 1.2s infinite; }
        #conn-badge.disconnected #conn-dot { background: var(--danger); }
        #reconnect-banner {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--warn-bg); border-top: 2px solid var(--warn);
            color: var(--warn); font-size: 13px; font-weight: 500;
            text-align: center; padding: 12px 16px; z-index: 300;
            display: none; animation: slideUp .3s ease;
        }
        #reconnect-banner.visible { display: block; }
        #reconnect-banner .spin-sm {
            display: inline-block; width: 12px; height: 12px;
            border: 2px solid var(--warn); border-top-color: transparent;
            border-radius: 50%; animation: spin .8s linear infinite;
            margin-right: 6px; vertical-align: middle;
        }
        @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.3} }
        @keyframes spin    { to{transform:rotate(360deg)} }
        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
        @keyframes cardIn  { from{opacity:0;transform:translateY(12px) scale(.98)} to{opacity:1;transform:translateY(0) scale(1)} }
        @keyframes cardOut { from{opacity:1} to{opacity:0;transform:translateY(-6px)} }
        @keyframes fall    { to{transform:translateY(110vh) rotate(720deg)} }
        @keyframes dotBeat { 0%,80%,100%{background:var(--border);transform:scale(1)} 40%{background:var(--accent);transform:scale(1.3)} }
        #confetti-box { position:fixed;top:0;left:0;right:0;height:100vh;pointer-events:none;z-index:9999;overflow:hidden; }
        .cp { position:absolute;top:-10px;border-radius:2px;animation:fall ease-in forwards; }
        .brand {
            display:flex;align-items:center;gap:10px;margin-bottom:24px;
            opacity:0;animation:cardIn .5s ease .1s forwards;
        }
        .brand-icon {
            width:34px;height:34px;background:var(--accent);border-radius:var(--radius-sm);
            display:flex;align-items:center;justify-content:center;flex-shrink:0;
        }
        .brand-icon svg { width:18px;height:18px;fill:white; }
        .brand-name { font-size:16px;font-weight:600;letter-spacing:-.3px;color:var(--text-1); }
        .brand-name span { color:var(--accent); }
        .wrapper { width:100%;max-width:440px; }
        .card {
            background:var(--surface);border:1px solid var(--border);
            border-radius:var(--radius-lg);padding:32px 28px;
            box-shadow:var(--shadow-lg);
            display:none !important;
            transition:background var(--tr),border-color var(--tr);
        }
        .card.active  { display:block !important;animation:cardIn var(--tr) forwards; }
        .card.leaving { display:block !important;animation:cardOut .18s ease forwards; }
        .card-icon {
            width:44px;height:44px;border-radius:var(--radius-sm);
            display:flex;align-items:center;justify-content:center;margin-bottom:18px;
        }
        .card-icon svg { width:22px;height:22px; }
        .card-icon.accent  { background:var(--accent-light); }
        .card-icon.success { background:var(--success-bg); }
        .card-icon.danger  { background:var(--danger-bg); }
        .card-icon.blocked { background:#2d0a0a; }
        .card h2 { font-size:1.2rem;font-weight:600;letter-spacing:-.3px;margin-bottom:6px;color:var(--text-1); }
        .card p  { font-size:14px;color:var(--text-2);line-height:1.6;margin-bottom:20px; }
        .field { margin-bottom:10px; }
        .field label { display:block;font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:5px; }
        textarea {
            width:100%;padding:11px 13px;border-radius:var(--radius-sm);
            background:var(--surface-2);border:1.5px solid var(--border);
            color:var(--text-1);font-family:inherit;font-size:14px;
            resize:none;transition:border-color var(--tr),background var(--tr);
            line-height:1.55;-webkit-appearance:none;
        }
        textarea::placeholder { color:var(--text-3); }
        textarea:focus { outline:none;border-color:var(--border-focus);background:var(--surface); }
        .char-count { text-align:right;font-size:11px;color:var(--text-3);margin-top:3px;transition:color .2s; }
        .char-count.warn { color:var(--warn); }
        .turnstile-wrap { margin:14px 0;min-height:65px; }
        .btn {
            display:flex;align-items:center;justify-content:center;gap:8px;
            width:100%;padding:13px 20px;border-radius:var(--radius-sm);
            font-family:inherit;font-size:14px;font-weight:600;
            cursor:pointer;border:none;transition:all var(--tr);
            -webkit-tap-highlight-color:transparent;touch-action:manipulation;
        }
        .btn-primary { background:var(--accent);color:white; }
        .btn-primary:hover:not(:disabled) { background:var(--accent-hover);transform:translateY(-1px); }
        .btn-primary:active:not(:disabled) { transform:translateY(0); }
        .btn-primary:disabled { opacity:.5;cursor:not-allowed; }
        .btn-secondary { background:var(--surface-2);color:var(--text-1);border:1.5px solid var(--border); }
        .btn-secondary:hover { background:var(--border); }
        .btn svg { width:15px;height:15px;flex-shrink:0; }
        .pending-visual { display:flex;flex-direction:column;align-items:center;padding:8px 0 4px; }
        .spinner-ring {
            width:48px;height:48px;border-radius:50%;
            border:3px solid var(--border);border-top-color:var(--accent);
            animation:spin 1s linear infinite;margin-bottom:18px;
        }
        .wait-timer { font-size:13px;color:var(--text-2);margin-top:6px; }
        .wait-timer strong { color:var(--accent);font-variant-numeric:tabular-nums; }
        .dots { display:flex;gap:5px;margin-top:12px; }
        .dots span { width:6px;height:6px;border-radius:50%;background:var(--border);animation:dotBeat 1.4s infinite; }
        .dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
        .res-badge {
            font-size:12px;font-weight:500;padding:3px 10px;
            border-radius:20px;display:inline-block;margin-bottom:14px;
        }
        .res-badge.approved { color:var(--success);background:var(--success-bg); }
        .res-badge.rejected { color:var(--danger);background:var(--danger-bg); }
        .res-badge.blocked  { color:var(--danger);background:var(--danger-bg); }
        #retry-info { font-size:13px;color:var(--text-2);margin-bottom:14px;text-align:center; }
        #retry-info strong { color:var(--accent);font-variant-numeric:tabular-nums; }
        .footer {
            margin-top:18px;font-size:11px;color:var(--text-3);text-align:center;
            opacity:0;animation:cardIn .5s ease .4s forwards;
        }
        @media (max-width:480px) {
            body { padding:16px 12px;justify-content:flex-start;padding-top:68px; }
            .card { padding:24px 20px;border-radius:var(--radius-md); }
            .brand { margin-bottom:16px; }
            #conn-badge { font-size:10px;padding:4px 8px; }
            .card h2 { font-size:1.1rem; }
        }
        @media (max-height:600px) {
            body { justify-content:flex-start;padding-top:56px; }
            .card { padding:20px 18px; }
            .brand { margin-bottom:12px; }
        }
    </style>
</head>
<body>
    <div id="confetti-box"></div>

    <button id="theme-toggle" onclick="toggleTheme()" title="Tema değiştir">🌙</button>

    <div id="conn-badge" class="connecting">
        <div id="conn-dot"></div>
        <span id="conn-label">Bağlanıyor</span>
    </div>

    <div id="reconnect-banner">
        <span class="spin-sm"></span>
        Bağlantı kesildi, yeniden bağlanılıyor<span id="rc-attempt"></span>...
    </div>

    <div class="brand">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5z"/></svg>
        </div>
        <span class="brand-name">Gate<span>Keeper</span></span>
    </div>

    <div class="wrapper">
        <!-- Erişim İste -->
        <div class="card" id="room-idle">
            <div class="card-icon accent">
                <svg viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <h2>Erişim İste</h2>
            <p>Sisteme giriş yapmak için kısa bir açıklama bırakın ve doğrulamayı tamamlayın.</p>
            <div class="field">
                <label for="note">Açıklama <span style="color:var(--text-3)">(isteğe bağlı)</span></label>
                <textarea id="note" placeholder="Neden erişmek istiyorsunuz?" rows="3" maxlength="200" oninput="updateCharCount(this)"></textarea>
                <div class="char-count" id="char-count">0 / 200</div>
            </div>
            <div class="turnstile-wrap">
                <div class="cf-turnstile"
                     id="turnstile-container"
                     data-sitekey="0x4AAAAAACtVuF98ksmPufI9"
                     data-theme="light"
                     data-callback="onTurnstileSuccess"
                     data-expired-callback="onTurnstileExpired"
                     data-error-callback="onTurnstileError">
                </div>
            </div>
            <button class="btn btn-primary" id="submit-btn" onclick="req()" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
                İstek Gönder
            </button>
        </div>

        <!-- Onay Bekleniyor -->
        <div class="card" id="room-pending">
            <div class="pending-visual">
                <div class="spinner-ring"></div>
                <h2>Onay Bekleniyor</h2>
                <p style="text-align:center;margin-bottom:8px">Talebiniz yöneticiye iletildi.<br>Bu sayfayı kapatmayın.</p>
                <div class="wait-timer">Bekleme: <strong id="wait-seconds">0</strong> sn</div>
                <div class="dots"><span></span><span></span><span></span></div>
            </div>
        </div>

        <!-- Sonuç -->
        <div class="card" id="room-result">
            <div class="card-icon" id="res-icon-wrap">
                <svg id="res-icon-svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
            </div>
            <div id="res-badge" class="res-badge"></div>
            <h2 id="res-t"></h2>
            <p id="res-d"></p>
            <div id="retry-info"></div>
            <div id="action-area"></div>
        </div>
    </div>

    <div class="footer">Korunan alan &nbsp;·&nbsp; GateKeeper</div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket, waitInterval, retryInterval, currentCard = null;
        let waitSeconds = 0, turnstileToken = null;

        const sid = localStorage.getItem('sid') || Math.random().toString(36).substr(2, 9);
        localStorage.setItem('sid', sid);

        // ── Tema ──────────────────────────────────────────────────────────
        const savedTheme = localStorage.getItem('gk_theme') ||
            (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        applyTheme(savedTheme);

        function applyTheme(t) {
            document.documentElement.setAttribute('data-theme', t);
            document.getElementById('theme-toggle').textContent = t === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('gk_theme', t);
            const tw = document.getElementById('turnstile-container');
            if (tw) tw.setAttribute('data-theme', t === 'dark' ? 'dark' : 'light');
        }
        function toggleTheme() {
            applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        // ── Turnstile ─────────────────────────────────────────────────────
        function onTurnstileSuccess(token) { turnstileToken = token; document.getElementById('submit-btn').disabled = false; }
        function onTurnstileExpired()      { turnstileToken = null;  document.getElementById('submit-btn').disabled = true; }
        function onTurnstileError()        { turnstileToken = null;  document.getElementById('submit-btn').disabled = true; }

        function updateCharCount(el) {
            const n = el.value.length;
            const d = document.getElementById('char-count');
            d.textContent = `${n} / 200`;
            d.classList.toggle('warn', n > 160);
        }

        // ── Bağlantı ──────────────────────────────────────────────────────
        function setConn(state, label) {
            document.getElementById('conn-badge').className = state;
            document.getElementById('conn-label').textContent = label;
        }
        function showBanner(attempt) {
            document.getElementById('rc-attempt').textContent = attempt > 0 ? ` (${attempt}. deneme)` : '';
            document.getElementById('reconnect-banner').classList.add('visible');
        }
        function hideBanner() { document.getElementById('reconnect-banner').classList.remove('visible'); }

        // ── Konfeti ───────────────────────────────────────────────────────
        function confetti() {
            const box = document.getElementById('confetti-box');
            const colors = ['#6366f1','#22c55e','#f59e0b','#ec4899','#06b6d4','#f87171'];
            for (let i = 0; i < 70; i++) {
                const p = document.createElement('div');
                const size = Math.random() * 8 + 4;
                p.className = 'cp';
                p.style.cssText = `
                    left:${Math.random()*100}%;
                    width:${size}px;height:${size}px;
                    background:${colors[Math.floor(Math.random()*colors.length)]};
                    border-radius:${Math.random()>.5?'50%':'2px'};
                    animation-delay:${Math.random()*.8}s;
                    animation-duration:${Math.random()*1.5+2}s;
                `;
                box.appendChild(p);
                setTimeout(() => p.remove(), 3500);
            }
        }

        // ── Geri sayım ────────────────────────────────────────────────────
        function startRetry(sec = 30) {
            let r = sec;
            const el  = document.getElementById('retry-info');
            const btn = document.querySelector('#action-area button');
            el.innerHTML = `Tekrar başvurabilmek için <strong id="r-sec">${r}</strong> saniye bekleyin.`;
            if (btn) btn.disabled = true;
            retryInterval = setInterval(() => {
                r--;
                const s = document.getElementById('r-sec');
                if (s) s.textContent = r;
                if (r <= 0) {
                    clearInterval(retryInterval);
                    el.innerHTML = '';
                    if (btn) btn.disabled = false;
                }
            }, 1000);
        }

        // ── Kart geçişi ───────────────────────────────────────────────────
        function showCard(status) {
            console.log('[GK] showCard:', status, '| currentCard:', currentCard);
            if (waitInterval  && status !== 'pending') { clearInterval(waitInterval);  waitSeconds = 0; }
            if (retryInterval)                         { clearInterval(retryInterval); retryInterval = null; }

            if (status === 'idle') {
                currentCard = 'room-idle';
                activateCard('room-idle');
                return;
            }
            if (status === 'pending') {
                currentCard = 'room-pending';
                activateCard('room-pending');
                waitSeconds = 0;
                document.getElementById('wait-seconds').textContent = '0';
                waitInterval = setInterval(() => {
                    waitSeconds++;
                    const el = document.getElementById('wait-seconds');
                    if (el) el.textContent = waitSeconds;
                }, 1000);
                return;
            }

            const cfgs = {
                approved: {
                    ic:'success', stroke:'var(--success)', path:'<polyline points="20 6 9 17 4 12"/>',
                    bc:'approved', bt:'Erişim Onaylandı',
                    tt:'Hoş geldiniz!', td:'Sisteme giriş yapmaya yetkiniz var.',
                    action:`<button class="btn btn-primary" onclick="location.reload()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>Panele Git</button>`,
                    fn: () => confetti()
                },
                rejected: {
                    ic:'danger', stroke:'var(--danger)',
                    path:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
                    bc:'rejected', bt:'Erişim Reddedildi',
                    tt:'Talebiniz reddedildi.', td:'Yönetici talebinizi onaylamadı.',
                    action:`<button class="btn btn-secondary" onclick="goIdle()">Tekrar Dene</button>`,
                    fn: () => startRetry(30)
                },
                blocked: {
                    ic:'blocked', stroke:'var(--danger)',
                    path:'<circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>',
                    bc:'blocked', bt:'Erişim Engellendi',
                    tt:'Bu sisteme erişiminiz engellendi.',
                    td:'Güvenlik nedeniyle erişiminiz kalıcı olarak kısıtlanmıştır.',
                    action:'', fn: null
                }
            };
            const c = cfgs[status];
            if (!c) return;
            currentCard = 'room-result';
            document.getElementById('res-icon-wrap').className = `card-icon ${c.ic}`;
            const svg = document.getElementById('res-icon-svg');
            svg.setAttribute('stroke', c.stroke);
            svg.innerHTML = c.path;
            const badge = document.getElementById('res-badge');
            badge.className = `res-badge ${c.bc}`;
            badge.textContent = c.bt;
            document.getElementById('res-t').textContent = c.tt;
            document.getElementById('res-d').textContent = c.td;
            document.getElementById('retry-info').innerHTML = '';
            document.getElementById('action-area').innerHTML = c.action;
            activateCard('room-result');
            if (c.fn) setTimeout(c.fn, 200);
        }

        function activateCard(id) {
            console.log('[GK] activateCard:', id);
            const el = document.getElementById(id);
            if (!el) return;
            // Tüm kartları gizle — sadece class ile, inline style kullanma
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = '';  // inline style temizle, CSS'e bırak
                if (c.id !== id) {
                    c.classList.remove('active', 'leaving');
                }
            });
            // Hedef kartı göster
            void el.offsetHeight;
            el.classList.remove('leaving');
            el.classList.add('active');
        }

        function goIdle() { location.reload(); }

        // ── İstek gönder ──────────────────────────────────────────────────
        function req() {
            if (!turnstileToken) return alert('Lütfen doğrulamayı tamamlayın!');
            const note = document.getElementById('note').value.trim();
            document.getElementById('submit-btn').disabled = true;
            const t = turnstileToken; turnstileToken = null;
            socket.emit('request_access', { turnstileToken: t, note });
        }

        // ── Socket ────────────────────────────────────────────────────────
        async function init() {
            const fp = await FingerprintJS.load();
            const { visitorId } = await fp.get();

            setConn('connecting', 'Bağlanıyor');
            activateCard('room-idle');
            currentCard = 'room-idle';

            socket = io({
                auth: { sessionId: sid, deviceId: visitorId },
                reconnectionDelay: 1000,
                reconnectionDelayMax: 5000,
            });

            socket.on('connect',           () => { setConn('connected',    'Bağlı');              hideBanner(); });
            socket.on('disconnect',        (r) => { setConn('disconnected', 'Bağlantı kesildi');  if (r !== 'io client disconnect') showBanner(0); });
            socket.on('reconnect_attempt', (n) => { setConn('connecting',   'Yeniden bağlanıyor'); showBanner(n); });
            socket.on('reconnect',         ()  => { setConn('connected',    'Yeniden bağlandı');  hideBanner(); });
            socket.on('connect_error',     ()  => { setConn('disconnected', 'Bağlanamadı'); });

            socket.on('status_update', (data) => {
                console.log('[GK] status_update:', data.status, '| currentCard:', currentCard);
                if (data.token) localStorage.setItem('gk_token', data.token);
                if ((data.status === 'rejected' || data.status === 'idle') && currentCard === 'room-idle') {
                    console.log('[GK] idle/rejected geldi ama zaten formdayız, atlandı');
                    return;
                }
                showCard(data.status);
            });
            socket.on('force_reload',  ()     => location.reload());
            socket.on('rate_limited',  (data) => {
                const btn = document.getElementById('submit-btn');
                const ori = btn.innerHTML;
                btn.textContent = '⏳ ' + (data.message || 'Çok fazla istek.');
                btn.disabled = true;
                setTimeout(() => { btn.innerHTML = ori; btn.disabled = false; }, 60000);
            });
        }

        init();
    </script>
</body>
</html>
